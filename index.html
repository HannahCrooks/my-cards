<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lily & Lace | Custom Cards</title>
    <style>
        :root {
            --pink: #ffdae9;
            --dark-pink: #ff85a2;
            --text: #4a4a4a;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fffafb;
            color: var(--text);
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        .container {
            max-width: 600px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(255, 133, 162, 0.1);
            border: 2px solid var(--pink);
        }
        h1 { color: var(--dark-pink); margin-bottom: 5px; }
        p { margin-bottom: 25px; }
        label {
            display: block;
            text-align: left;
            font-weight: bold;
            margin-top: 15px;
            color: var(--dark-pink);
        }
        input, textarea, select {
            width: 100%;
            padding: 12px;
            margin-top: 5px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
        }
        textarea { height: 80px; resize: vertical; }
        .btn {
            background-color: var(--dark-pink);
            color: white;
            padding: 15px 25px;
            border: none;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 25px;
            width: 100%;
            transition: transform 0.2s;
        }
        .btn:hover { transform: scale(1.02); background-color: #f07491; }
        .footer-note { font-size: 12px; color: #999; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Lily & Lace</h1>
    <p>Handmade with love. Order your custom card below.</p>

    <label for="cardDesign">1. Choose Your Design</label>
    <select id="cardDesign">
        <option value="Pastel Garden">Pastel Garden</option>
        <option value="Vintage Rose">Vintage Rose</option>
        <option value="Minimalist Gold">Minimalist Gold</option>
        <option value="Birthday Special">Birthday Special</option>
    </select>

    <label for="customerMessage">2. Inside Message</label>
    <textarea id="customerMessage" placeholder="What should the card say?"></textarea>

    <label for="shippingAddr">3. Delivery Address</label>
    <textarea id="shippingAddr" placeholder="Name, Street, City, Postcode"></textarea>

    <button type="button" class="btn" onclick="sendOrder()">Send Order via Email</button>
    
    <p class="footer-note">* Clicking this will open your email app to finish sending.</p>
</div>

<script>
function sendOrder() {
    // Get the values from the boxes
    const design = document.getElementById('cardDesign').value;
    const message = document.getElementById('customerMessage').value;
    const address = document.getElementById('shippingAddr').value;
    
    // Your school email
    const myEmail = "hcrooks@saac.qld.edu.au";
    
    // Create the email subject and body
    const subject = "New Card Order: " + design;
    const body = "LILY & LACE ORDER\n" +
                 "------------------\n" +
                 "Design: " + design + "\n\n" +
                 "Message:\n" + message + "\n\n" +
                 "Delivery Address:\n" + address;
    
    // Build the mailto link
    const mailtoLink = "mailto:" + myEmail + 
                       "?subject=" + encodeURIComponent(subject) + 
                       "&body=" + encodeURIComponent(body);
    
    // Launch the email app
    window.location.href = mailtoLink;
}
</script>

</body>
</html>
